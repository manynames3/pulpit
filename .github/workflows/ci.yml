name: Pulpit CI

# Runs on every push and pull request to main.
# Two jobs:
#   1. validate — format check, lint, security scan (no AWS needed)
#   2. plan     — terraform plan against dev (requires AWS credentials)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.7.0"
  AWS_REGION:  "us-east-1"

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Validate (runs without AWS creds)
  # Catches formatting, syntax, and security issues
  # before any cloud resources are touched.
  # ─────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Fail if any .tf file isn't properly formatted.
      # Enforces consistent style across all contributors.
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # Validate syntax and internal consistency.
      # Catches missing variables, bad references, type errors.
      - name: Terraform Validate
        run: |
          terraform init -backend=false
          terraform validate

      # Checkov — static security scanner for IaC.
      # Flags misconfigurations before deploy:
      #   - S3 buckets without encryption
      #   - IAM policies with wildcards
      #   - Unencrypted DynamoDB tables
      #   - Public security groups
      # Ties directly into the SOC 2 baseline story.
      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true  # warn but don't block on first run
          output_format: cli

      # Lint Terraform with TFLint.
      # Catches AWS-specific issues Checkov misses:
      #   - Invalid instance types
      #   - Deprecated resource arguments
      #   - Missing required tags
      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: |
          tflint --init
          tflint --recursive

  # ─────────────────────────────────────────────
  # JOB 2 — Plan (requires AWS credentials)
  # Shows exactly what will change before apply.
  # Never auto-applies — deploy is a manual step.
  # ─────────────────────────────────────────────
  plan:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    needs: validate  # only runs if validate passes
    environment: dev

    # Skip plan on PRs from forks — they won't have AWS secrets
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # AWS credentials stored as GitHub repository secrets.
      # Never hardcoded — see README for setup instructions.
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init
        working-directory: environments/dev

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        working-directory: environments/dev
        continue-on-error: true

      # Post plan output as PR comment so reviewers
      # see exactly what will change without running anything locally.
      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `### 🗺️ Terraform Plan (dev)
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pushed by @${{ github.actor }} on \`${{ github.ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
